name: US Market Volatility Alert

on:
  schedule:
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "跳过交易时段检查，强制运行（用于手动测试）"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run volatility check
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && 'true' || 'false' }}
        run: python scripts/volatility_alert.py

      - name: Commit state and alerts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state reports/alerts
          git diff --cached --quiet || git commit -m "Update volatility alert state"
          git push
